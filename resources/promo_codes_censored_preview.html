<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Safelist Promo Code Tracker — CENSORED PREVIEW</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181b22;
    --border: #252830;
    --accent: #00e5a0;
    --accent2: #0088ff;
    --silver: #a8b4c8;
    --gold: #f0c040;
    --vip: #c084fc;
    --elite: #fb923c;
    --warn: #ff6b35;
    --text: #e2e8f0;
    --muted: #6b7280;
    --done: #1a2e1e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0d1117 0%, #111827 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-family: "Space Mono", monospace; font-size: 1.3rem; color: var(--accent); }
  header p { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  .stats-bar { display: flex; gap: 20px; margin-top: 8px; font-size: 0.77rem; color: var(--muted); flex-wrap: wrap; }
  .stats-bar span { color: var(--accent); font-family: "Space Mono", monospace; }

  .controls {
    padding: 12px 28px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .search-box {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 7px 12px; color: var(--text); font-family: "DM Sans", sans-serif;
    font-size: 0.83rem; width: 240px; outline: none; transition: border-color 0.2s;
  }
  .search-box:focus { border-color: var(--accent2); }
  .btn {
    padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text); font-size: 0.78rem;
    cursor: pointer; transition: all 0.15s; font-family: "DM Sans", sans-serif;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.08); }
  .btn.danger { color: var(--warn); border-color: var(--warn); margin-left: auto; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 1px; background: var(--border);
  }

  .card {
    background: var(--surface);
    padding: 14px;
    transition: background 0.15s;
    display: flex; flex-direction: column; gap: 10px;
  }
  .card:hover { background: var(--surface2); }
  .card.fully-done { background: #111a14; }

  /* Site name at top */
  .site-name {
    font-size: 0.92rem; font-weight: 700;
    color: var(--accent2); text-decoration: none;
    line-height: 1.2; word-break: break-word;
    transition: color 0.15s; display: block; margin-bottom: 2px;
  }
  .site-name:hover { color: var(--accent); text-decoration: underline; }

  .card-meta {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .badge {
    font-family: "Space Mono", monospace; font-size: 0.62rem;
    padding: 2px 6px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--muted);
  }

  .account-created-row {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 8px;
    background: rgba(0,136,255,0.07);
    border-radius: 5px; border: 1px solid rgba(0,136,255,0.15);
  }
  .account-created-row label { font-size: 0.73rem; color: #5b9bd5; font-weight: 600; cursor: pointer; }

  .tier-section { display: flex; flex-direction: column; gap: 4px; }
  .tier-label {
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 2px 0 4px 0; border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }
  .tier-label.free { color: var(--accent); }
  .tier-label.silver { color: var(--silver); }
  .tier-label.gold { color: var(--gold); }
  .code-text.gold-code { color: var(--gold); }
  .tier-label.vip { color: var(--vip); }
  .tier-label.elite { color: var(--elite); }
  .code-text.vip-code { color: var(--vip); }

  .code-row {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 8px;
    background: var(--bg); border-radius: 4px;
    border: 1px solid transparent; transition: border-color 0.12s, opacity 0.12s;
  }
  .code-row:hover { border-color: var(--border); }
  .code-row.used { opacity: 0.38; text-decoration: line-through; }

  .code-text {
    font-family: "Space Mono", monospace; font-size: 0.72rem;
    color: var(--accent); flex: 1; word-break: break-all; cursor: pointer; user-select: all;
  }
  .code-text.silver-code { color: var(--silver); }
  .code-text:hover { color: #fff; }

  .copy-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 0.67rem; padding: 2px 4px;
    border-radius: 3px; transition: all 0.12s; flex-shrink: 0;
  }
  .copy-btn:hover { color: var(--accent); background: rgba(0,229,160,0.1); }

  input[type="checkbox"] { width: 13px; height: 13px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }

  .progress-bar { height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; margin-top: 4px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 1px; transition: width 0.3s; }
  .progress-label { font-size: 0.65rem; color: var(--muted); text-align: right; margin-top: 3px; }

  .toast {
    position: fixed; bottom: 20px; right: 20px;
    background: var(--surface2); border: 1px solid var(--accent); color: var(--accent);
    padding: 9px 16px; border-radius: 8px; font-size: 0.8rem;
    font-family: "Space Mono", monospace;
    opacity: 0; transform: translateY(8px); transition: all 0.2s;
    pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .no-results { grid-column: 1/-1; padding: 60px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>// SAFELIST PROMO TRACKER — CENSORED PREVIEW</h1>
  <p>Advertising Blowout — PREVIEW VERSION (codes censored)</p>
  <div class="stats-bar">
    <div>Sites: <span id="stat-sites">0</span></div>
    <div>Total Codes: <span id="stat-codes">0</span></div>
    <div>Codes Used: <span id="stat-used">0</span></div>
    <div>Accounts Created: <span id="stat-accounts">0</span></div>
  </div>
</header>
<div class="controls">
  <input class="search-box" type="text" id="search" placeholder="Search sites or codes…" oninput="applyFilter()">
  <button class="btn active" onclick="filterBy('all')" id="btn-all">All</button>
  <button class="btn" onclick="filterBy('no-account')" id="btn-no-account">No Account</button>
  <button class="btn" onclick="filterBy('has-unused')" id="btn-has-unused">Has Unused</button>
  <button class="btn" onclick="filterBy('free-only')" id="btn-free-only">Free Only</button>
  <button class="btn" onclick="filterBy('silver-only')" id="btn-silver-only">Silver Only</button>
  <button class="btn" onclick="filterBy('gold-only')" id="btn-gold-only">Gold Only</button>
  <button class="btn" onclick="filterBy('vip-only')" id="btn-vip-only">VIP Only</button>
  <button class="btn" onclick="filterBy('elite-only')" id="btn-elite-only">Elite Only</button>
  <button class="btn danger" onclick="clearAll()">Reset All</button>
</div>
<div class="grid" id="grid"></div>
<div class="no-results" id="no-results" style="display:none;">No sites match.</div>
<div class="toast" id="toast">Copied!</div>

let state = {};
let filterMode = "all";

function loadState() {
  try { const r = localStorage.getItem("sb_promo_v5_censored"); if (r) state = JSON.parse(r); } catch(e){}
}
function saveState() {
  try { localStorage.setItem("sb_promo_v5_censored", JSON.stringify(state)); } catch(e){}
}
function getState(name) {
  if (!state[name]) state[name] = { account: false, used: {} };
  return state[name];
}

function toggleAccount(name) {
  getState(name).account = !getState(name).account;
  saveState(); updateStats(); renderCard(name); applyFilter();
}
function toggleCode(name, tier, code) {
  const s = getState(name);
  const key = tier + "|" + code;
  s.used[key] = !s.used[key];
  saveState(); updateStats(); renderCard(name);
}
function copyCode(code) {
  const t = document.getElementById("toast");
  t.textContent = "Codes are censored in this preview";
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

function totalCodes(site) {
  return Object.values(site.tiers).reduce((a,v) => a + v.length, 0);
}

function renderCard(name) {
  const el = document.getElementById("card-" + CSS.escape(name));
  if (!el) return;
  const site = SITES.find(s => s.name === name);
  const st = getState(name);

  const allCodes = [];
  for (const [tier, codes] of Object.entries(site.tiers)) {
    codes.forEach(c => allCodes.push({tier, code: c}));
  }
  const total = allCodes.length;
  const usedCount = allCodes.filter(({tier,code}) => st.used[tier+"|"+code]).length;
  const pct = total > 0 ? Math.round(usedCount/total*100) : 0;
  const allUsed = usedCount === total && total > 0;

  el.className = "card" + (allUsed && st.account ? " fully-done" : "");

  const tierSections = Object.entries(site.tiers).map(([tier, codes]) => {
    const rows = codes.map(code => {
      const key = tier+"|"+code;
      const used = st.used[key] ? "used" : "";
      const codeClass = tier === "Silver" ? "code-text silver-code" : tier === "Gold" ? "code-text gold-code" : tier === "VIP" ? "code-text vip-code" : "code-text";
      const nameEsc = name.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
      const codeEsc = code.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
      return `<div class="code-row ${used}">
        <input type="checkbox" ${used?"checked":""} onchange="toggleCode('${nameEsc}','${tier}','${codeEsc}')">
        <span class="${codeClass}" onclick="copyCode('${codeEsc}')">${code}</span>
        <button class="copy-btn" onclick="copyCode('${codeEsc}')">copy</button>
      </div>`;
    }).join("");
    return `<div class="tier-section">
      <div class="tier-label ${tier.toLowerCase()}">${tier}</div>
      ${rows}
    </div>`;
  }).join("");

  el.innerHTML = `
    <a class="site-name" href="${guessUrl(name)}" target="_blank" rel="noopener">${name}</a>
    <div class="card-meta">
      <span class="badge">${total} code${total!==1?"s":""}</span>
    </div>
    <div class="account-created-row">
      <input type="checkbox" id="acc-${name}" ${st.account?"checked":""} onchange="toggleAccount('${name.replace(/'/g,"\\'")}')">
      <label for="acc-${name}">Account Created</label>
    </div>
    ${tierSections}
    <div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${usedCount}/${total} used</div>
    </div>`;
}

function buildGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  SITES.forEach(site => {
    const div = document.createElement("div");
    div.className = "card";
    div.id = "card-" + site.name;
    grid.appendChild(div);
    renderCard(site.name);
  });
}

function filterBy(mode) {
  filterMode = mode;
  document.querySelectorAll(".btn").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById("btn-" + mode);
  if (btn) btn.classList.add("active");
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  let visible = 0;
  SITES.forEach(site => {
    const el = document.getElementById("card-" + site.name);
    if (!el) return;
    const st = getState(site.name);
    const allCodes = [];
    for (const [tier, codes] of Object.entries(site.tiers)) codes.forEach(c => allCodes.push({tier,code:c}));
    let show = true;
    if (filterMode === "no-account") show = !st.account;
    if (filterMode === "has-unused") show = allCodes.some(({tier,code}) => !st.used[tier+"|"+code]);
    if (filterMode === "free-only") show = !!site.tiers["Free"];
    if (filterMode === "silver-only") show = !!site.tiers["Silver"];
    if (filterMode === "gold-only") show = !!site.tiers["Gold"];
    if (filterMode === "vip-only") show = !!site.tiers["VIP"];
    if (filterMode === "elite-only") show = !!site.tiers["Elite"];
    if (q) {
      const match = site.name.toLowerCase().includes(q) || allCodes.some(({code}) => code.toLowerCase().includes(q));
      show = show && match;
    }
    el.style.display = show ? "" : "none";
    if (show) visible++;
  });
  document.getElementById("no-results").style.display = visible === 0 ? "" : "none";
}

function updateStats() {
  let totalCodes = 0, used = 0, accounts = 0;
  SITES.forEach(site => {
    const st = getState(site.name);
    if (st.account) accounts++;
    for (const [tier, codes] of Object.entries(site.tiers)) {
      codes.forEach(c => {
        totalCodes++;
        if (st.used[tier+"|"+c]) used++;
      });
    }
  });
  document.getElementById("stat-sites").textContent = SITES.length;
  document.getElementById("stat-codes").textContent = totalCodes;
  document.getElementById("stat-used").textContent = used;
  document.getElementById("stat-accounts").textContent = accounts;
}

function clearAll() {
  if (!confirm("Reset all checkboxes? This cannot be undone.")) return;
  state = {}; saveState(); buildGrid(); updateStats();
}

loadState(); buildGrid(); updateStats(); applyFilter();
</script>
